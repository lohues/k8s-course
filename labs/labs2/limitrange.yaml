apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: lab
spec:
  limits:
  - type: Container
    default:          # applied if not specified
      cpu: "500m"
      memory: "256Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    max:              # hard ceiling
      cpu: "2"
      memory: "2Gi"